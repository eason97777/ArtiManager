<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ArtiManager{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}">
    <script defer src="{{ url_for('static', path='app.js') }}"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand-wrap">
        <a class="brand" href="/">ArtiManager</a>
        <p class="subtitle">Local Literature Workbench</p>
      </div>
      <nav class="main-nav">
        <a href="/">Dashboard</a>
        <a href="/papers/inbox">Inbox</a>
        <a href="/search">Search</a>
        <a href="/discovery">Discovery</a>
        <a href="/tracking">Tracking</a>
        <a href="/relationships/review">Relationships</a>
        <a href="/analyses">Analyses</a>
      </nav>
    </header>

    <main class="page-shell">
      {% if ok_message %}
      <div class="banner banner-ok">{{ ok_message }}</div>
      {% endif %}
      {% if error_message %}
      <div class="banner banner-error">{{ error_message }}</div>
      {% endif %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
